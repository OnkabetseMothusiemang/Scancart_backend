{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Reset Password</title>
    <link rel="stylesheet" href="{% static 'admin/css/base.css' %}">
    <style>
        .popup {
            display: none;
            padding: 12px 15px;
            background: #d4edda;
            border: 1px solid #c3e6cb;
            color: #155724;
            margin-bottom: 15px;
            border-radius: 5px;
        }
        .popup.show {
            display: block;
        }
    </style>
</head>
<body>
<div style="max-width: 400px; margin: 50px auto; padding: 20px; border: 1px solid #ddd; border-radius: 8px;">
    <h2>Reset Your Password</h2>
    <p>Enter your email address and we'll send you a link to reset your password.</p>

    {% if messages %}
        <div class="popup show">
            {% for message in messages %}
                {{ message }}
            {% endfor %}
        </div>
    {% endif %}

    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit" style="padding: 8px 15px; background:#417690; color:white; border:none; border-radius:4px;">Send Reset Link</button>
    </form>
</div>
</body>
</html>
